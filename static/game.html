<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏭 工廠導覽 - 2D 互動遊戲</title>
  <link rel="stylesheet" href="/static/css/game.css">
</head>
<body>
  <!-- 頂部標題 -->
  <div class="header">
    <div>
      <h1>🏭 智慧工廠導覽</h1>
      <span class="subtitle">Interactive Factory Tour — Powered by AI</span>
    </div>
  </div>

  <!-- 主容器 -->
  <div class="game-container">
    <!-- 遊戲畫面 -->
    <div id="canvas-container">
      <canvas id="game-canvas" width="900" height="650"></canvas>
    </div>

    <!-- 聊天面板 -->
    <div class="chat-panel">
      <div class="chat-header">
        <span class="status-dot"></span>
        🧑‍🏭 AI 導覽助手
      </div>
      <div id="chat-messages"></div>
      <div class="chat-input-row">
        <input id="chat-input" placeholder="輸入問題詢問導覽員..." autocomplete="off">
        <button id="chat-send">送出</button>
      </div>
    </div>
  </div>

  <script type="module" src="/static/js/main.js"></script>
</body>
</html>
